<!DOCTYPE html>
<html>
<head>
    <title>Biểu đồ</title>
    <meta charset="UTF-8">
</head>
<body>
    <h2>Danh sách Biểu đồ</h2>
    <p><a href="/">Quay lại trang chủ</a></p>
    
    {% if images %}
        {% for img in images %}
        <div style="margin-bottom: 30px;">
            <h3>{{ img }}</h3>
            <img src="{{ url_for('static', filename='charts/' + img) }}" alt="{{ img }}" width="800" style="border: 1px solid #ccc;">
        </div>
        <hr>
        {% endfor %}
    {% else %}
        <p>Chưa có biểu đồ nào trong thư mục <code>static/charts/</code>. Hãy chạy script tạo biểu đồ trước.</p>
    {% endif %}
</body>
</html>
